<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipekAI — Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #080808;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrap {
            width: 100%;
            max-width: 460px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 0.78rem;
            color: #555;
            margin-top: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(12px);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-3);
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .info-banner {
            background: rgba(252, 211, 77, 0.08);
            border: 1px solid rgba(252, 211, 77, 0.25);
            color: #fcd34d;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        .form-input::placeholder { color: #444; }

        .pw-rules {
            font-size: 0.72rem;
            color: #555;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.7;
            margin: 6px 0 18px;
            padding-left: 4px;
        }

        .pw-rule { display: flex; align-items: center; gap: 6px; }
        .pw-rule.met  { color: #6ee7b7; }
        .pw-rule.miss { color: #555; }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #fff, #aaa);
            color: #080808;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: #555;
            font-size: 0.78rem;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        .btn-link:hover { color: var(--text-2); }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- Phase 16.7: real Petabyte logo (same as login page). -->
        <div class="brand">
            <div class="brand-logo" style="width:64px;height:64px">
                <img src="/assets/logo-ptb.png" alt="Petabyte"
                     style="width:100%;height:100%;object-fit:contain"/>
            </div>
            <div class="brand-name">PipekAI</div>
            <div class="brand-sub" id="who">เปลี่ยนรหัสผ่านครั้งแรก</div>
        </div>

        <div class="card">
            <div class="card-title">ตั้งรหัสผ่านใหม่</div>
            <div class="card-desc">
                เพื่อความปลอดภัย กรุณาเปลี่ยนรหัสผ่านชั่วคราวเป็นรหัสของคุณเองก่อนเริ่มใช้งาน
            </div>

            <div class="info-banner">
                ⓘ รหัสผ่านนี้ตั้งโดย admin — เปลี่ยนแล้วจะใช้รหัสเดิมเข้าสู่ระบบไม่ได้อีก
            </div>

            <div class="error-msg" id="error-msg"></div>

            <form id="pw-form" onsubmit="handleChange(event)">
                <div class="form-group">
                    <label class="form-label" for="new-pw">รหัสผ่านใหม่</label>
                    <input class="form-input" id="new-pw" type="password" autocomplete="new-password"
                        placeholder="อย่างน้อย 8 ตัว มีตัวอักษร+ตัวเลข" required oninput="updateRules()" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-pw2">ยืนยันรหัสผ่านใหม่</label>
                    <input class="form-input" id="new-pw2" type="password" autocomplete="new-password"
                        placeholder="พิมพ์อีกครั้ง" required oninput="updateRules()" />
                </div>

                <div class="pw-rules" id="pw-rules">
                    <div class="pw-rule miss" id="r-len">○ ยาวอย่างน้อย 8 ตัว</div>
                    <div class="pw-rule miss" id="r-letter">○ มีตัวอักษร (A-Z, a-z)</div>
                    <div class="pw-rule miss" id="r-digit">○ มีตัวเลข (0-9)</div>
                    <div class="pw-rule miss" id="r-match">○ รหัสทั้งสองช่องตรงกัน</div>
                </div>

                <button class="btn-primary" type="submit" id="submit-btn" disabled>เปลี่ยนรหัสผ่าน</button>
                <button class="btn-link" type="button" onclick="signOut()">ออกจากระบบ</button>
            </form>
        </div>
    </div>

    <script src="js/config.js?v=phase9-1"></script>
    <script src="js/auth.js?v=phase24"></script>
    <script>
        // Guard: must be logged in to be here
        (function () {
            const session = Auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            // Show username
            document.getElementById('who').textContent = '@' + session.username;
        })();

        function updateRules() {
            const pw = document.getElementById('new-pw').value;
            const pw2 = document.getElementById('new-pw2').value;
            const rules = {
                len:    pw.length >= 8 && pw.length <= 128,
                letter: /[A-Za-z]/.test(pw),
                digit:  /[0-9]/.test(pw),
                match:  pw && pw === pw2,
            };
            for (const k in rules) {
                const el = document.getElementById('r-' + k);
                el.className = 'pw-rule ' + (rules[k] ? 'met' : 'miss');
                el.textContent = (rules[k] ? '● ' : '○ ') + el.textContent.replace(/^[●○]\s*/, '');
            }
            const allOk = rules.len && rules.letter && rules.digit && rules.match;
            document.getElementById('submit-btn').disabled = !allOk;
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError() {
            document.getElementById('error-msg').classList.remove('show');
        }

        async function handleChange(e) {
            e.preventDefault();
            hideError();
            const pw  = document.getElementById('new-pw').value;
            const pw2 = document.getElementById('new-pw2').value;
            if (pw !== pw2) { showError('รหัสทั้งสองช่องไม่ตรงกัน'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'กำลังบันทึก...';

            const result = await Auth.changePassword(pw);
            if (!result.ok) {
                showError(result.error || 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'เปลี่ยนรหัสผ่าน';
                return;
            }
            // Done — redirect by role
            const session = Auth.getSession();
            window.location.href = (session && session.role === 'admin') ? 'admin.html' : 'index.html';
        }

        function signOut() {
            Auth.logout();    // also clears token + redirects to login.html
        }
    </script>
</body>

</html>
