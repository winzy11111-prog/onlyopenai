<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipekAI — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <style>
        /* ───────────────────────────────────────────────────────────
           Pastel theme derived from the Petabyte logo palette:
             --logo-light  #4691DA   bright azure (T + B front face)
             --logo-mid    #2E6CB0   mid blue     (wordmark)
             --logo-navy   #143A66   deep navy    (B depth/shadow)
           Light, airy background; white frosted card; blue accents.
           ─────────────────────────────────────────────────────────── */
        :root {
            --logo-light: #4691da;
            --logo-mid:   #2e6cb0;
            --logo-navy:  #143a66;
            --ink:        #1e3a5f;   /* primary text  */
            --ink-2:      #4a5f7a;   /* secondary     */
            --ink-3:      #8499b4;   /* muted/labels  */
            --line:       rgba(70, 145, 218, 0.18);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(1100px 600px at 50% -10%, #ffffff 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(160deg, #eaf3fe 0%, #dcebfb 46%, #f4f9ff 100%);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Soft blue grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(70, 145, 218, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(70, 145, 218, 0.055) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
            -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
            pointer-events: none;
        }

        /* Ambient blue glow */
        body::after {
            content: '';
            position: fixed;
            top: -220px;
            left: 50%;
            transform: translateX(-50%);
            width: 640px;
            height: 640px;
            background: radial-gradient(circle, rgba(70, 145, 218, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 176px;
            max-width: 64%;
            margin: 0 auto 16px;
            background: #ffffff;
            border: 1px solid rgba(70, 145, 218, 0.14);
            border-radius: 24px;
            padding: 16px 20px;
            box-shadow:
                0 14px 34px rgba(46, 108, 176, 0.18),
                0 2px 6px rgba(46, 108, 176, 0.08);
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .brand-name {
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--logo-light), var(--logo-mid));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 0.86rem;
            font-weight: 500;
            color: var(--ink-3);
            margin-top: 6px;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 20px 56px rgba(46, 108, 176, 0.16),
                0 2px 0 rgba(255, 255, 255, 0.7) inset;
            border-radius: 22px;
            padding: 32px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.775rem;
            font-weight: 700;
            color: var(--ink-2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: #ffffff;
            border: 1px solid rgba(70, 145, 218, 0.22);
            border-radius: 11px;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--logo-light);
            box-shadow: 0 0 0 4px rgba(70, 145, 218, 0.15);
        }

        .form-input::placeholder {
            color: #aebfd6;
        }

        /* Submit */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--logo-light) 0%, var(--logo-mid) 100%);
            color: #ffffff;
            border: none;
            border-radius: 11px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 22px rgba(46, 108, 176, 0.28);
            margin-top: 4px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(46, 108, 176, 0.36);
            filter: saturate(1.05);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 6px 16px rgba(46, 108, 176, 0.28);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Error */
        .error-msg {
            background: rgba(220, 53, 69, 0.08);
            border: 1px solid rgba(220, 53, 69, 0.28);
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.75rem;
            color: var(--ink-3);
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <!-- Brand: full Petabyte logo (TB monogram + wordmark) on a white
             rounded badge so it reads cleanly over the pastel background. -->
        <div class="brand">
            <div class="brand-logo">
                <img src="/assets/logo-ptb.png" alt="Petabyte" />
            </div>
            <div class="brand-name">PipekAI</div>
            <div class="brand-sub">AI Coding Assistant for SAP / ABAP</div>
        </div>

        <div class="login-card">
            <!-- Phase 16.26: single unified login form.
                 The old role-tabs UI (User Login / Admin Login) was cosmetic —
                 the server determines role from the user record, not from
                 which tab the visitor clicked. Removed for clarity. -->

            <!-- Error -->
            <div class="error-msg" id="error-msg"></div>

            <!-- Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" id="username" type="text" placeholder="กรอก username..."
                        autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" type="password" placeholder="กรอก password..."
                        autocomplete="current-password" required />
                </div>

                <button class="btn-login" type="submit" id="login-btn">เข้าสู่ระบบ</button>
            </form>
        </div>

        <div class="login-footer">
            PipekAI &nbsp;|&nbsp; 2026
        </div>
    </div>

    <script src="js/config.js?v=phase9-1"></script>
    <script src="js/auth.js?v=phase24"></script>
    <script>
        // Phase 16.26: removed role tabs — server decides role from the
        // user record after login, no need to pre-select on the form.

        // Redirect if already logged in
        (function () {
            const session = Auth.getSession();
            if (session) {
                // Phase 8: pending pw change short-circuits everything else
                if (session.mustChangePassword) {
                    window.location.href = 'change-password.html';
                    return;
                }
                window.location.href = session.role === 'admin' ? 'admin.html' : 'index.html';
            }
        })();

        // Phase 19.5: show a friendly message when we got bounced here
        // because the previous session expired (?expired=1) or the user
        // explicitly logged out (?loggedout=1).
        (function () {
            try {
                const q = new URLSearchParams(window.location.search);
                if (q.get('expired') === '1') {
                    const el = document.getElementById('error-msg');
                    if (el) {
                        el.textContent = '⏱ Session หมดอายุ — กรุณาเข้าสู่ระบบใหม่';
                        el.classList.add('show');
                    }
                } else if (q.get('loggedout') === '1') {
                    const el = document.getElementById('error-msg');
                    if (el) {
                        // Soften the styling for "successful logout" — same
                        // element, neutral text, no scary red.
                        el.textContent = '✓ ออกจากระบบเรียบร้อยแล้ว';
                        el.classList.add('show');
                        el.style.background = 'rgba(34, 197, 94, 0.10)';
                        el.style.borderColor = 'rgba(34, 197, 94, 0.30)';
                        el.style.color = '#15803d';
                    }
                }
            } catch (_) { /* ignore — purely cosmetic */ }
        })();

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-msg').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.textContent = 'กำลังตรวจสอบ...';

            try {
                const result = await Auth.login(username, password);
                if (!result.ok) {
                    // Phase 8: surface locked-account messages distinctly
                    showError(result.locked
                        ? '🔒 ' + (result.error || 'Account locked')
                        : (result.error || 'Invalid credentials'));
                    btn.disabled = false;
                    btn.textContent = 'เข้าสู่ระบบ';
                    return;
                }
                // Phase 8: forced password change → go to dedicated page first
                if (result.mustChangePassword) {
                    window.location.href = 'change-password.html';
                    return;
                }
                window.location.href = result.session.role === 'admin' ? 'admin.html' : 'index.html';
            } catch (e) {
                showError('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        // Fields start blank — users type their own credentials.
        // (Browser may still offer saved logins via autocomplete.)
    </script>
</body>

</html>
