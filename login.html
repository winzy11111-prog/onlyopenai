<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetabyteAi — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #080808;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-sub {
            font-size: 0.82rem;
            color: #555;
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(12px);
        }

        /* Role tabs */
        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 28px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 4px;
        }

        .role-tab {
            padding: 9px;
            border-radius: 8px;
            border: none;
            background: none;
            color: #666;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .role-tab.active {
            background: rgba(255, 255, 255, 0.09);
            color: #f0f0f0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.775rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
        }

        .form-input::placeholder {
            color: #444;
        }

        /* Demo hint */
        .demo-hint {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 0.78rem;
            color: #666;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.7;
        }

        .demo-hint strong {
            color: var(--text-2);
        }

        /* Submit */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #fff, #aaa);
            color: #080808;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <!-- Phase 16.7: real Petabyte logo. The brand-logo box is sized by
             existing CSS; only the inner element changes. We bump the slot
             slightly so the logo with wordmark reads at this entry-page scale. -->
        <div class="brand">
            <div class="brand-logo" style="width:64px;height:64px">
                <img src="/assets/petabyte2_nobg.png" alt="Petabyte"
                     style="width:100%;height:100%;object-fit:contain"/>
            </div>
            <div class="brand-name">PetabyteAi</div>
            <div class="brand-sub">AI Coding Assistant for SAP/ABAP</div>
        </div>

        <div class="login-card">
            <!-- Phase 16.26: single unified login form.
                 The old role-tabs UI (User Login / Admin Login) was cosmetic —
                 the server determines role from the user record, not from
                 which tab the visitor clicked. Removed for clarity.
                 Demo credentials below are kept ONLY as a dev convenience
                 (single block showing both admin + user creds). -->

            <!-- Error -->
            <div class="error-msg" id="error-msg"></div>

            <!-- Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" id="username" type="text" placeholder="กรอก username..."
                        autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" id="password" type="password" placeholder="กรอก password..."
                        autocomplete="current-password" required />
                </div>

                <button class="btn-login" type="submit" id="login-btn">เข้าสู่ระบบ</button>

                <!-- Demo credentials block (dev only — remove before production) -->
                <div class="demo-hint" style="margin-top:18px">
                    <div style="font-size:.68rem;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">
                        🛠 Demo credentials
                    </div>
                    <div><strong>Admin:</strong> admin / admin123</div>
                    <div><strong>User:</strong> user / user123 &nbsp;·&nbsp; user2 / user456 &nbsp;·&nbsp; user3 / user789</div>
                </div>
            </form>
        </div>

        <div class="login-footer">
            PetabyteAi — Demo Platform &nbsp;|&nbsp; 2026
        </div>
    </div>

    <script src="js/config.js?v=phase9-1"></script>
    <script src="js/auth.js?v=phase9-1"></script>
    <script>
        // Phase 16.26: removed role tabs — server decides role from the
        // user record after login, no need to pre-select on the form.

        // Redirect if already logged in
        (function () {
            const session = Auth.getSession();
            if (session) {
                // Phase 8: pending pw change short-circuits everything else
                if (session.mustChangePassword) {
                    window.location.href = 'change-password.html';
                    return;
                }
                window.location.href = session.role === 'admin' ? 'admin.html' : 'index.html';
            }
        })();

        // Phase 19.5: show a friendly message when we got bounced here
        // because the previous session expired (?expired=1) or the user
        // explicitly logged out (?loggedout=1).
        (function () {
            try {
                const q = new URLSearchParams(window.location.search);
                if (q.get('expired') === '1') {
                    const el = document.getElementById('error-msg');
                    if (el) {
                        el.textContent = '⏱ Session หมดอายุ — กรุณาเข้าสู่ระบบใหม่';
                        el.classList.add('show');
                    }
                } else if (q.get('loggedout') === '1') {
                    const el = document.getElementById('error-msg');
                    if (el) {
                        // Soften the styling for "successful logout" — same
                        // element, neutral text, no scary red.
                        el.textContent = '✓ ออกจากระบบเรียบร้อยแล้ว';
                        el.classList.add('show');
                        el.style.background = 'rgba(34, 197, 94, 0.10)';
                        el.style.borderColor = 'rgba(34, 197, 94, 0.30)';
                        el.style.color = '#15803d';
                    }
                }
            } catch (_) { /* ignore — purely cosmetic */ }
        })();

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-msg').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.textContent = 'กำลังตรวจสอบ...';

            try {
                const result = await Auth.login(username, password);
                if (!result.ok) {
                    // Phase 8: surface locked-account messages distinctly
                    showError(result.locked
                        ? '🔒 ' + (result.error || 'Account locked')
                        : (result.error || 'Invalid credentials'));
                    btn.disabled = false;
                    btn.textContent = 'เข้าสู่ระบบ';
                    return;
                }
                // Phase 8: forced password change → go to dedicated page first
                if (result.mustChangePassword) {
                    window.location.href = 'change-password.html';
                    return;
                }
                window.location.href = result.session.role === 'admin' ? 'admin.html' : 'index.html';
            } catch (e) {
                showError('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        // Pre-fill user credentials on load
        document.getElementById('username').value = 'user';
        document.getElementById('password').value = 'user123';
    </script>
</body>

</html>
